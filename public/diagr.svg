<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="diagr-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="8" y="8" width="112" height="112" rx="20" ry="20" fill="url(#diagr-gradient)" />

  <!-- Branch symbol (GitBranch icon) -->
  <g transform="translate(64, 64)">
    <!-- Left vertical line -->
    <line x1="-12" y1="-16" x2="-12" y2="16" stroke="white" stroke-width="3" stroke-linecap="round" />

    <!-- Top right branch -->
    <line x1="-12" y1="-16" x2="12" y2="-6" stroke="white" stroke-width="3" stroke-linecap="round" />
    <circle cx="12" cy="-6" r="4" fill="white" />

    <!-- Bottom right branch -->
    <line x1="-12" y1="16" x2="12" y2="6" stroke="white" stroke-width="3" stroke-linecap="round" />
    <circle cx="12" cy="6" r="4" fill="white" />

    <!-- Center circle on main line -->
    <circle cx="-12" cy="0" r="4" fill="white" />
  </g>
</svg>

