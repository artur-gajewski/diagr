<!doctype html>
<html lang="en">
  <head>
    <!-- Character encoding and viewport -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary metadata -->
    <title>Diagr — Free Online Diagram Designer</title>
    <meta name="description" content="Create professional diagrams online with Diagr. Free, open-source diagram editor with keyboard shortcuts, export to PNG/SVG/PDF, dark mode, and real-time collaboration features." />
    <meta name="keywords" content="Diagrams, diagram designer, online editor, class diagram, sequence diagram, free tool" />
    <meta name="author" content="Artur Gajewski" />
    <meta name="theme-color" content="#1e293b" />
    <meta name="color-scheme" content="light dark" />

    <!-- Canonical URL (update with your actual domain) -->
    <link rel="canonical" href="https://diagr.app" />

    <!-- Favicon and icons -->
    <link rel="icon" type="image/svg+xml" href="/diagr.svg" />
    <link rel="apple-touch-icon" href="/diagr.svg" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://diagr.app" />
    <meta property="og:title" content="Diagr — Free Online Diagram Designer" />
    <meta property="og:description" content="Create professional diagrams online with keyboard shortcuts, multiple export formats, and dark mode support." />
    <meta property="og:image" content="https://diagr.app/diagr.svg" />
    <meta property="og:site_name" content="Diagr" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://diagr.app" />
    <meta name="twitter:title" content="Diagr — Free Online Diagram Designer" />
    <meta name="twitter:description" content="Create professional diagrams online with keyboard shortcuts, multiple export formats, and dark mode support." />
    <meta name="twitter:image" content="https://diagr.app/diagr.svg" />
    <meta name="twitter:creator" content="@diagr_app" />

    <!-- Additional SEO -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="revisit-after" content="7 days" />
    <meta name="copyright" content="© 2026 Diagr. All rights reserved." />
    <meta name="language" content="English" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Schema.org structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Diagr",
      "description": "Free online diagram designer with export capabilities",
      "url": "https://diagr.app",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Create diagrams",
        "Export to PNG, SVG, PDF, JSON",
        "Keyboard shortcuts",
        "Dark mode support",
        "Grid snapping",
        "Real-time editing"
      ],
      "image": "https://diagr.app/diagr.svg",
      "author": {
        "@type": "Organization",
        "name": "Artur Gajewski"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
